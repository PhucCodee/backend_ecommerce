services:
    api:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "8080:8080"
        environment:
            # General
            - ASPNETCORE_URLS=${ASPNETCORE_URLS}
            - TZ=Asia/Ho_Chi_Minh

            # Database Connection
            - ConnectionStrings__DefaultConnection=Username=postgres;Password=${POSTGRES_PASSWORD};Host=db;Port=5432;Database=database

            # RabbitMQ Connection
            - RabbitMQ__Host=message_broker
            - RabbitMQ__User=${RABBITMQ_DEFAULT_USER}
            - RabbitMQ__Pass=${RABBITMQ_DEFAULT_PASS}

            # JWT Secrets
            - Jwt__SecretKey=${JWT_SECRET_KEY}
            - Jwt__Issuer=ECommerce.API
            - Jwt__Audience=ECommerce.Client

            # SendGrid Connection
            - EmailSettings__ApiKey=${EmailSettings__ApiKey}

            # ZaloPay Connection
            - ZaloPay__AppId=${ZaloPay__AppId}
            - ZaloPay__Key1=${ZaloPay__Key1}
            - ZaloPay__Key2=${ZaloPay__Key2}
            - ZaloPay__CreateOrderUrl=${ZaloPay__CreateOrderUrl}
            - ZaloPay__CallbackUrl=${ZaloPay__CallbackUrl}
            - ZaloPay__BankCode=${ZaloPay__BankCode}

            # MoMo Configuration
            # - MoMo__PartnerCode=${MoMo__PartnerCode}
            # - MoMo__AccessKey=${MoMo__AccessKey}
            # - MoMo__SecretKey=${MoMo__SecretKey}
            # - MoMo__RedirectUrl=${MoMo__RedirectUrl}
            # - MoMo__IpnUrl=${MoMo__IpnUrl}

            - Redis_Host=cache
        volumes:
            - uploads_data:/app/uploads
        depends_on:
            - db
            - message_broker

    db:
        image: postgres:15
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD} # Use variable
            - POSTGRES_DB=database
            - TZ=Asia/Ho_Chi_Minh
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./database/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
            - ./database/02_users.sql:/docker-entrypoint-initdb.d/02_users.sql:ro
            - ./database/03_categories.sql:/docker-entrypoint-initdb.d/03_categories.sql:ro
            - ./database/04_products.sql:/docker-entrypoint-initdb.d/04_products.sql:ro
            - ./database/05_product_categories.sql:/docker-entrypoint-initdb.d/05_product_categories.sql:ro
            - ./database/06_product_skus.sql:/docker-entrypoint-initdb.d/06_product_skus.sql:ro
            - ./database/07_product_images.sql:/docker-entrypoint-initdb.d/07_product_images.sql:ro
            - ./database/08_inventory.sql:/docker-entrypoint-initdb.d/08_inventory.sql:ro

    message_broker:
        image: rabbitmq:3-management
        environment:
            - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
            - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
        ports:
            - "5672:5672"
            - "15672:15672"

    # cache:
    #     image: redis:7
    #     ports:
    #         - "6379:6379"
    #     volumes:
    #         - redis_data:/data

    chatbot_api:
        build:
            context: ./ai-module/
            dockerfile: Dockerfile
        ports:
            - "8000:8000"
        environment:
            - DB_HOST=db
            - DB_NAME=database
            - DB_USER=postgres
            - DB_PASSWORD=${POSTGRES_PASSWORD}
            - DB_PORT=5432
            - CHROMA_DB_PATH=/app/chroma_db
            # The AI module uses Groq for the LLM (chat) and (optionally) Google
            # for embeddings — pass whichever keys are set in .env.
            - GROQ_API_KEY=${GROQ_API_KEY}
            - GOOGLE_API_KEY=${GOOGLE_API_KEY}
        depends_on:
            - db
        volumes:
            - ./ai-module/app:/app/app
            - ./ai-module/data/vector/chroma_db_data1:/app/chroma_db

    # ── Observability stack: Loki (logs) + Promtail (shipper) + Grafana ──────
    loki:
        image: grafana/loki:3.0.0
        # Run as root so Loki can create its data dirs inside the named volume
        # (a fresh volume at /tmp/loki is root-owned, blocking the loki user).
        user: root
        command: -config.file=/etc/loki/loki-config.yml
        ports:
            - "3100:3100"
        volumes:
            - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
            - loki_data:/tmp/loki

    promtail:
        image: grafana/promtail:3.0.0
        command: -config.file=/etc/promtail/promtail-config.yml
        volumes:
            - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro
        depends_on:
            - loki

    grafana:
        image: grafana/grafana:11.0.0
        # Host port 3003 — 3000 buyer, 3001 admin, 3002 seller are all taken.
        ports:
            - "3003:3000"
        environment:
            - GF_SECURITY_ADMIN_USER=admin
            - GF_SECURITY_ADMIN_PASSWORD=admin
            - GF_USERS_ALLOW_SIGN_UP=false
            # Allow the admin app to embed dashboards in an iframe.
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
            - GF_SECURITY_ALLOW_EMBEDDING=true
        volumes:
            - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
            - grafana_data:/var/lib/grafana
        depends_on:
            - loki

volumes:
    postgres_data:
    redis_data:
    uploads_data:
    loki_data:
    grafana_data:
