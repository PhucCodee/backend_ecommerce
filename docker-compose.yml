services:
    api:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "8080:8080"
        environment:
            - ASPNETCORE_URLS=http://+:8080
            - ConnectionStrings__DefaultConnection=Username=postgres;Password=123;Host=db;Port=5432;Database=database
            - Redis__Host=cache
            - RabbitMQ__Host=message_broker
        depends_on:
            - db
            - cache
            - message_broker

    db:
        image: postgres:15
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=123
            - POSTGRES_DB=database
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./database/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
            - ./database/02_data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro

    cache:
        image: redis:7
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data

    message_broker:
        image: rabbitmq:3-management
        ports:
            - "5672:5672"
            - "15672:15672"
    chatbot_api:
        build:
            context: .
            dockerfile: ai-module/main/Dockerfile.api
        ports:
        - "8000:8000"
        env_file:
        - chatbot.env
        environment:
        - DB_HOST=db
        - DB_NAME=database
        - DB_USER=postgres
        - DB_PASSWORD=123
        depends_on:
        - db

volumes:
    postgres_data:
    redis_data: